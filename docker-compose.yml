services:
    template-db:
        image: postgres:18.3-bookworm
        container_name: template-db
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        volumes:
            - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
        restart: always

    template-postgres-migrate:
        image: migrate/migrate:v4.19.1
        volumes:
            - ${PROJECT_ROOT}/migrations:/migrations

    port-forwarder:
        image: alpine/socat:1.8.0.3
        container_name: template-postgres-port-forwarder
        command: 'tcp-listen:5432,reuseaddr,fork tcp-connect:template-db:5432'
        ports:
            - '127.0.0.1:5432:5432'
        depends_on:
            - template-db
